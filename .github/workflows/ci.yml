# Pipeline de Integración Continua (CI) con GitHub Actions
# Se ejecuta automáticamente en cada push o pull request a la rama main
# Etapas: Checkout → Dependencias → Linting → Tests

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Stage 1: Checkout del código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Stage 2: Configuración del entorno Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Stage 3: Instalación de dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Stage 4: Análisis estático de código (Linting)
      - name: Análisis estático con Flake8
        run: |
          flake8 src/ --max-line-length=120 --statistics

      # Stage 5: Ejecución de pruebas unitarias
      - name: Ejecutar pruebas con Pytest
        run: |
          pytest tests/ -v --tb=short
