apiVersion: apps/v1
kind: Deployment
metadata:
  name: labtech-app
  labels:
    app: labtech-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: labtech-app
  template:
    metadata:
      labels:
        app: labtech-app
    spec:
      containers:
        - name: labtech-app
          image: usuario/labtech-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
